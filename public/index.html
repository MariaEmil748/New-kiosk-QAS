<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBTD — بوابة الموظفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-mark">TB</div>
            <div class="logo-text">
                <span class="logo-name">TBTD</span>
                <span class="logo-sub" id="logo-sub">بوابة الموظفين</span>
            </div>
        </div>
        <div class="header-right">
            <div class="language-switcher">
                <button class="lang-btn active" id="lang-ar" onclick="setLanguage('ar')">AR</button>
                <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">EN</button>
            </div>
            <div class="status-dot"></div>
            <span class="status-text" id="status-text">النظام يعمل</span>
        </div>
    </header>

    <!-- SCREEN 1: FINGERPRINT -->
    <main class="screen" id="waiting-screen">
        <div class="waiting-content">
            <div class="scan-area">
                <div class="scan-ring ring1"></div>
                <div class="scan-ring ring2"></div>
                <div class="scan-ring ring3"></div>
                <div class="scan-icon">
                    <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
                        <path d="M32 8C18.7 8 8 18.7 8 32s10.7 24 24 24 24-10.7 24-24S45.3 8 32 8z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <path d="M32 16c-8.8 0-16 7.2-16 16s7.2 16 16 16 16-7.2 16-16-7.2-16-16-16z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
                        <path d="M20 32c0-6.6 5.4-12 12-12s12 5.4 12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M24 32c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="32" cy="32" r="4" fill="currentColor"/>
                        <path d="M28 38c0 0 1 4 4 4s4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
            </div>
            <h1 class="waiting-title" id="waiting-title">NEW KIOSK</h1>
            <p class="waiting-subtitle" id="waiting-subtitle">ضع إصبعك على الماسح الضوئي للوصول إلى معلوماتك</p>
            <button class="device-scan-btn" onclick="fetchEmployeeFromDevice()" id="device-scan-btn">
                <span id="device-scan-btn-text">قراءة البصمة من الجهاز</span>
            </button>
            <div class="search-box">
                <button class="search-btn" onclick="fetchEmployee()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <input type="text" id="emp-id-input" placeholder="الرقم الوظيفي" autocomplete="off" />
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
            </div>
        </div>
    </main>

    <!-- SCREEN 2: DASHBOARD -->
    <main class="screen hidden" id="data-screen">

        <!-- Auto-logout timer -->
        <div class="logout-timer" id="logout-timer">
            <div class="timer-bar" id="timer-bar"></div>
            <div class="timer-content">
                <span class="timer-text"><span id="timer-prefix">سيتم تسجيل الخروج تلقائياً خلال</span> <strong id="timer-seconds">60</strong> <span id="timer-suffix">ثانية</span></span>
            </div>
        </div>

        <div class="data-header">
            <div class="verified-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="verified-text">تم التحقق</span>
            </div>
            <button class="back-btn" onclick="goBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                <span id="logout-text">خروج</span>
            </button>
        </div>

        <!-- Profile -->
        <div class="profile-card">
            <div class="profile-decoration"></div>
            <div class="profile-photo-ring">
                <img class="profile-photo" id="emp-photo" src="https://ui-avatars.com/api/?name=Employee&background=1d4ed8&color=fff&size=512" alt="صورة الموظف" />
            </div>
            <div class="photo-status" id="photo-status"></div>
            <div class="profile-info">
                <h2 id="emp-name">اسم الموظف</h2>
                <div class="profile-details-grid">
                    <div class="profile-detail-item">
                        <span class="profile-detail-label" id="label-employee-id">الرقم الوظيفي</span>
                        <strong id="emp-hr-code">-----</strong>
                    </div>
                    <div class="profile-detail-item">
                        <span class="profile-detail-label" id="label-position">المسمى الوظيفي</span>
                        <strong id="emp-title">المسمى الوظيفي</strong>
                    </div>
                    <div class="profile-detail-item">
                        <span class="profile-detail-label" id="label-org-unit">الإدارة / الوحدة</span>
                        <strong id="emp-location">الموقع</strong>
                    </div>
                    <div class="profile-detail-item">
                        <span class="profile-detail-label" id="label-approver">المدير المباشر</span>
                        <strong id="emp-approver">غير متوفر</strong>
                    </div>
                </div>
            </div>
        </div>

        <div class="leave-history-card">
            <div class="section-title" id="leave-history-title">سجل الإجازات</div>
            <div class="leave-history-content" id="leave-history-content"></div>
        </div>

        <!-- Actions -->
        <div class="section-title" id="section-title">الخدمات المتاحة</div>
        <div class="actions-grid">

            <button class="action-card" onclick="handleAction('late-permission')">
                <div class="action-icon icon-blue">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </div>
                <span class="action-label" id="action-late-permission">اذن تأخير</span>
            </button>

            <button class="action-card" onclick="handleAction('early-leave')">
                <div class="action-icon icon-orange">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                </div>
                <span class="action-label" id="action-early-leave">اذن انصراف</span>
            </button>

            <button class="action-card" onclick="handleAction('leave-request')">
                <div class="action-icon icon-green">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <span class="action-label" id="action-leave-request">طلب اجازة</span>
            </button>

            <button class="action-card" onclick="handleAction('work-from-home')">
                <div class="action-icon icon-purple">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                <span class="action-label" id="action-work-from-home">طلب عمل من المنزل</span>
            </button>

            <button class="action-card" onclick="handleAction('review-report')">
                <div class="action-icon icon-teal">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <span class="action-label" id="action-review-report">تقرير مراجعة الطلبات</span>
            </button>

            <button class="action-card" onclick="handleAction('mission-checkout')">
                <div class="action-icon icon-red">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/></svg>
                </div>
                <span class="action-label" id="action-mission-checkout">تسجيل خروج مأمورية</span>
            </button>

            <button class="action-card" onclick="handleAction('full-day-mission')">
                <div class="action-icon icon-gold">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l1.09-1.09a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>
                </div>
                <span class="action-label" id="action-full-day-mission">مأمورية يوم كامل</span>
            </button>

            <button class="action-card" onclick="handleAction('mission-return')">
                <div class="action-icon icon-cyan">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </div>
                <span class="action-label" id="action-mission-return">تسجيل عودة من مأمورية</span>
            </button>

            <button class="action-card" onclick="handleAction('contract-renewal')">
                <div class="action-icon icon-indigo">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h6M9 11h6"/></svg>
                </div>
                <span class="action-label" id="action-contract-renewal">تجديد عقد</span>
            </button>

            <button class="action-card" onclick="handleAction('received-items')">
                <div class="action-icon icon-pink">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 7h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 4h4v3h-4V4z"/></svg>
                </div>
                <span class="action-label" id="action-received-items">استلامات متعلقة</span>
            </button>

        </div>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <h3 id="modal-title">العنوان</h3>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay hidden" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
